<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>SkillHire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h2>SkillHire</h2>
        <button onclick="openLogin()">Нэвтрэх</button>
        <button onclick="openRegister()">Бүртгүүлэх</button>
    </header>

    <h1>Монголын ажлын платформ</h1>

    <div id="jobs">
        <h3>Ажлын жагсаалт</h3>
        <button onclick="showJob1()">Backend Developer</button>
        <button onclick="showJob2()">Skill Swap</button>
    </div>

    <div id="jobDetail">
        <p>Ажил сонгоно уу...</p>
    </div>

    <!-- Login/Register хэсэг -->
    <div id="authBox" style="display:none;">
        <h3 id="authTitle">Нэвтрэх</h3>
        <input type="text" id="name" placeholder="Нэр">
        <input type="email" id="email" placeholder="Имэйл">
        <input type="password" id="password" placeholder="Нууц үг">
        <button onclick="submitForm()">Илгээх</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
